name: Lamix Country Monitor

# External Cron (cron-job.org) দিয়ে প্রতি ৫ মিনিটে চালানো হয়
# Last updated: 27 May 2026

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run monitor
        env:
          TELEGRAM_TOKEN:     ${{ secrets.TELEGRAM_TOKEN }}
          SEARCH_IN_BODY:     'false'
          MY_PAT_TOKEN:       ${{ secrets.MY_PAT_TOKEN }}
          ADMIN_ID:           ${{ secrets.ADMIN_ID }}
          ALERT_GROUP_ID:     ${{ secrets.ALERT_GROUP_ID }}     # গ্রুপে মেসেজ পাঠানোর জন্য
          GITHUB_REPO:        ariful5/lamix-monitor
        run: python monitor.py

      - name: Save results to repo
        run: |
          git config user.name  "Lamix Bot"
          git config user.email "bot@lamix-monitor"
          echo "$(date -u '+%Y-%m-%d %H:%M UTC')" > last_run.txt
          git add last_results.json last_run.txt users_config.json || true
          git commit -m "Update results $(date -u '+%Y-%m-%d %H:%M UTC')" || true
          git push || true
